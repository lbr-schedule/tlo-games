<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>рҹҖ„ T-LO йә»е°Ү</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e, #16213e); 
            min-height: 100vh; 
            color: white; 
        }
        
        /* ж©«еҗ‘дҪҲеұҖ */
        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 800px;
            margin: 0 auto;
            padding: 10px;
        }
        
        h1 { text-align: center; font-size: 1.3rem; margin: 5px 0; }
        
        /* зҺ©е®¶иіҮиЁҠ */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 10px; margin-bottom: 8px;
        }
        .coin { color: #ffd700; font-size: 1.1rem; }
        
        /* е°ҚжүӢеҚҖ - ж°ҙе№іжҺ’еҲ— */
        .opponents-row {
            display: flex; justify-content: space-around; padding: 5px; 
            background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 8px;
        }
        .opponent {
            display: flex; flex-direction: column; align-items: center;
        }
        .opponent-name { font-size: 0.7rem; color: #aaa; margin-bottom: 3px; }
        .opponent-tiles { display: flex; gap: 2px; }
        .opp-tile {
            width: 22px; height: 30px; background: linear-gradient(135deg, #4a5568, #2d3748);
            border-radius: 3px; display: flex; align-items: center; justify-content: center;
            color: #718096; font-size: 0.7rem;
        }
        
        /* зүҢжЎҢ */
        .table-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #2d5a27; border-radius: 50%; min-height: 150px;
            margin: 0 -10px;
        }
        
        /* зҺ©е®¶жүӢзүҢ - ж©«еҗ‘ж»‘еӢ• */
        .player-area {
            background: rgba(255,255,255,0.05); border-radius: 15px; padding: 10px; margin-top: 8px;
        }
        .player-label { font-size: 0.75rem; color: #aaa; margin-bottom: 5px; }
        
        .player-hand {
            display: flex; gap: 4px; overflow-x: auto; padding-bottom: 5px;
            justify-content: center;
        }
        .player-hand::-webkit-scrollbar { height: 4px; }
        .player-hand::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .player-hand::-webkit-scrollbar-thumb { background: #667eea; border-radius: 2px; }
        
        /* йә»е°ҮзүҢ - дҪҝз”Ё Unicode */
        .tile {
            min-width: 38px; height: 52px; flex-shrink: 0;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 50%, #fff 100%);
            border-radius: 5px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
            position: relative;
        }
        .tile:hover { transform: translateY(-5px); box-shadow: 0 5px 10px rgba(0,0,0,0.4); }
        .tile.selected { background: linear-gradient(135deg, #ffd700, #ffaa00); transform: translateY(-8px); }
        
        /* жҢүйҲ•еҚҖ */
        .action-row {
            display: flex; gap: 8px; justify-content: center; margin-top: 8px; flex-wrap: wrap;
        }
        .btn {
            padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; font-size: 0.9rem;
            font-weight: bold; transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-success { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
        .btn-warning { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        /* жҸҗзӨә */
        .message {
            text-align: center; padding: 8px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; margin: 8px 0; font-size: 0.85rem;
        }
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: white; padding: 10px 20px; border-radius: 20px;
            z-index: 1000; font-size: 0.9rem;
        }
        
        /* зҷ»е…Ҙ */
        .auth-section { text-align: center; padding: 40px 20px; }
        .auth-section input { 
            padding: 12px; border: 2px solid #667eea; border-radius: 10px; 
            width: 200px; font-size: 1rem; margin: 5px;
        }
        
        /* йҮ‘е№ЈдёҚи¶і */
        .buy-coins {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        .buy-coins h2 { color: #ffd700; margin-bottom: 15px; }
        .buy-coins p { color: #aaa; margin-bottom: 20px; padding: 0 20px; }
        
        /* жҸҗзӨәж–Үеӯ— */
        .turn-info {
            text-align: center; color: #ffd700; font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>рҹҖ„ T-LO йә»е°Ү</h1>
        
        <div id="authSection" class="auth-section">
            <input type="text" id="usernameInput" placeholder="ијёе…Ҙеёіиҷҹ">
            <br>
            <button class="btn btn-primary" onclick="doLogin()">йҖІе…ҘйҒҠжҲІ</button>
        </div>
        
        <div id="gameSection" style="display:none;">
            <div class="top-bar">
                <span id="playerName">зҺ©е®¶</span>
                <span class="coin">рҹӘҷ <span id="coinDisplay">1000</span></span>
            </div>
            
            <!-- е°ҚжүӢеҚҖ -->
            <div class="opponents-row">
                <div class="opponent">
                    <div class="opponent-name">йӣ»и…Ұ1</div>
                    <div class="opponent-tiles" id="opp1"></div>
                </div>
                <div class="opponent">
                    <div class="opponent-name">йӣ»и…Ұ2</div>
                    <div class="opponent-tiles" id="opp2"></div>
                </div>
                <div class="opponent">
                    <div class="opponent-name">йӣ»и…Ұ3</div>
                    <div class="opponent-tiles" id="opp3"></div>
                </div>
            </div>
            
            <!-- зүҢжЎҢ -->
            <div class="table-area">
                <div class="turn-info" id="turnInfo">рҹҺҙ зӯүеҫ…й–Ӣе§Ӣ</div>
            </div>
            
            <!-- зҺ©е®¶жүӢзүҢ -->
            <div class="player-area">
                <div class="player-label">дҪ зҡ„жүӢзүҢпјҲй»һж“ҠеҮәзүҢпјү</div>
                <div class="player-hand" id="playerHand"></div>
            </div>
            
            <div class="action-row" id="actionPanel" style="display:none;">
                <button class="btn btn-success" onclick="doChi()">еҗғ</button>
                <button class="btn btn-success" onclick="doPeng()">зў°</button>
                <button class="btn btn-warning" onclick="doGang()">ж§“</button>
                <button class="btn btn-primary" onclick="doHu()">иғЎ</button>
            </div>
            
            <div class="action-row">
                <button class="btn btn-primary" id="startBtn" onclick="startGame()">рҹҺ® й–Ӣе§ӢйҒҠжҲІ</button>
            </div>
            
            <div class="message" id="message">16ејөйә»е°Ү В· иҙҸеҸ–йҮ‘е№Ј</div>
        </div>
    </div>
    
    <!-- йҮ‘е№ЈдёҚи¶і -->
    <div id="buyCoinsModal" class="buy-coins" style="display:none;">
        <h2>рҹӘҷ йҮ‘е№ЈдёҚи¶і</h2>
        <p>жӮЁзҡ„йҮ‘е№Је·Із”Ёе®ҢпјҢи«ӢиҒҜз№«е®ўжңҚиіјиІ·йҮ‘е№Ј</p>
        <button class="btn btn-primary" onclick="contactLine()">рҹ“ұ LINE иҒҜз№«е„ІеҖј</button>
    </div>

    <script>
        // ========== йә»е°Ү Unicode еӯ—з¬Ұ ==========
        // иҗ¬еӯҗ
        const WAN = ['рҹҖҮ','рҹҖҲ','рҹҖү','рҹҖҠ','рҹҖӢ','рҹҖҢ','рҹҖҚ','рҹҖҺ','рҹҖҸ'];
        // зӯ’еӯҗ
        const TONG = ['рҹҖҷ','рҹҖҡ','рҹҖӣ','рҹҖң','рҹҖқ','рҹҖһ','рҹҖҹ','рҹҖ ','рҹҖЎ'];
        // жўқеӯҗ
        const TIAO = ['рҹҖҗ','рҹҖ‘','рҹҖ’','рҹҖ“','рҹҖ”','рҹҖ•','рҹҖ–','рҹҖ—','рҹҖҳ'];
        // еӯ—зүҢ
        const ZI = ['рҹҖҖ','рҹҖҒ','рҹҖӮ','рҹҖғ','рҹҖ„','рҹҖ…','рҹҖҶ'];
        
        function getTileChar(type, value) {
            if (type === 'wan') return WAN[value - 1];
            if (type === 'tong') return TONG[value - 1];
            if (type === 'tiao') return TIAO[value - 1];
            if (type === 'zi') return ZI[value - 1];
            return 'вқ“';
        }
        
        let playerHand = [];
        let opponentHands = [[], [], []];
        let wall = [];
        let gameStarted = false;
        let coins = 1000;
        let username = '';
        
        function initTiles() {
            let tiles = [];
            for (let i = 1; i <= 9; i++) for (let j = 0; j < 4; j++) tiles.push({type:'wan',value:i});
            for (let i = 1; i <= 9; i++) for (let j = 0; j < 4; j++) tiles.push({type:'tong',value:i});
            for (let i = 1; i <= 9; i++) for (let j = 0; j < 4; j++) tiles.push({type:'tiao',value:i});
            for (let i = 0; i < 7; i++) for (let j = 0; j < 4; j++) tiles.push({type:'zi',value:i});
            return tiles;
        }
        
        function shuffle(tiles) {
            for (let i = tiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
            }
            return tiles;
        }
        
        function deal() {
            playerHand = [];
            opponentHands = [[], [], []];
            let all = shuffle(initTiles());
            for (let i = 0; i < 16; i++) {
                playerHand.push(all.pop());
                for (let p = 0; p < 3; p++) opponentHands[p].push(all.pop());
            }
            wall = all;
            renderAll();
        }
        
        function renderAll() {
            // зҺ©е®¶жүӢзүҢ
            document.getElementById('playerHand').innerHTML = playerHand.map((t, i) =>
                `<div class="tile" onclick="selectTile(${i})">${getTileChar(t.type, t.value)}</div>`
            ).join('');
            
            // е°ҚжүӢжүӢзүҢпјҲиғҢйқўпјү
            ['opp1','opp2','opp3'].forEach((id, idx) => {
                document.getElementById(id).innerHTML = opponentHands[idx].map(() =>
                    `<div class="opp-tile">?</div>`
                ).join('');
            });
        }
        
        function selectTile(index) {
            if (!gameStarted) return;
            const tile = playerHand.splice(index, 1)[0];
            showToast(`жү“еҮәпјҡ${tile.type}${tile.value}`);
            renderAll();
            
            document.getElementById('turnInfo').textContent = 'йӣ»и…ҰеӣһеҗҲ...';
            setTimeout(computerTurn, 1000);
        }
        
        function computerTurn() {
            if (opponentHands[0].length > 0) {
                const idx = Math.floor(Math.random() * opponentHands[0].length);
                opponentHands[0].splice(idx, 1);
            }
            if (wall.length > 0) {
                const t = wall.pop();
                playerHand.push(t);
                showToast(`ж‘ёеҲ°пјҡ${t.type}${t.value}`);
            }
            renderAll();
            document.getElementById('turnInfo').textContent = 'дҪ зҡ„еӣһеҗҲ';
        }
        
        function showToast(msg) {
            document.querySelectorAll('.toast').forEach(t => t.remove());
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }
        
        function startGame() {
            if (coins < 100) {
                document.getElementById('buyCoinsModal').style.display = 'flex';
                return;
            }
            deal();
            gameStarted = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('turnInfo').textContent = 'дҪ зҡ„еӣһеҗҲ';
            document.getElementById('message').textContent = 'рҹҺ® йҒҠжҲІй–Ӣе§ӢпјҒ';
        }
        
        function doChi() { showToast('еҗғ'); }
        function doPeng() { showToast('зў°'); }
        function doGang() { showToast('ж§“'); }
        function doHu() {
            showToast('рҹҺү иғЎдәҶпјҒ +100йҮ‘е№Ј');
            coins += 100;
            document.getElementById('coinDisplay').textContent = coins;
            if (username) localStorage.setItem('mahjong_coins_' + username, coins);
        }
        
        function contactLine() {
            window.open('https://line.me/ti/p/@HAPPYNEWYA', '_blank');
        }
        
        function doLogin() {
            const name = document.getElementById('usernameInput').value.trim();
            if (!name) { alert('и«Ӣијёе…Ҙеёіиҷҹ'); return; }
            username = name;
            coins = parseInt(localStorage.getItem('mahjong_coins_' + username)) || 1000;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('gameSection').style.display = 'block';
            document.getElementById('playerName').textContent = username;
            document.getElementById('coinDisplay').textContent = coins;
        }
    </script>
</body>
</html>
