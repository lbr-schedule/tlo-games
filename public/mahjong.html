<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🀄 T-LO 麻將</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e, #16213e); 
            min-height: 100vh; 
            color: white; 
            overflow-x: hidden; 
        }
        
        .game-container {
            display: flex; flex-direction: column;
            height: 100vh; max-width: 600px; margin: 0 auto; padding: 8px;
        }
        
        h1 { text-align: center; font-size: 1.2rem; margin: 5px 0; }
        
        /* 頂部資訊 */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 10px; margin-bottom: 8px;
        }
        .coin { color: #ffd700; font-size: 1rem; }
        
        /* 對手區 - 橫向排列 */
        .opponents-row {
            display: flex; justify-content: space-around; padding: 5px; 
            background: rgba(0,0,0,0.2); border-radius: 10px; margin-bottom: 8px;
        }
        .opponent { display: flex; flex-direction: column; align-items: center; }
        .opponent-name { font-size: 0.65rem; color: #aaa; margin-bottom: 2px; }
        .opponent-tiles { display: flex; gap: 1px; }
        .opp-tile {
            width: 20px; height: 28px; background: linear-gradient(135deg, #4a5568, #2d3748);
            border-radius: 3px; display: flex; align-items: center; justify-content: center;
            color: #718096; font-size: 0.6rem;
        }
        
        /* 牌桌區 */
        .table-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #2d5a27; border-radius: 50%; min-height: 120px;
            margin: 0 -10px;
        }
        
        /* 玩家手牌 */
        .player-area {
            background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px; margin-top: 8px;
        }
        .player-label { font-size: 0.7rem; color: #aaa; margin-bottom: 5px; }
        
        .player-hand {
            display: flex; gap: 3px; overflow-x: auto; padding-bottom: 5px;
            justify-content: flex-start;
        }
        .player-hand::-webkit-scrollbar { height: 3px; }
        .player-hand::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .player-hand::-webkit-scrollbar-thumb { background: #667eea; border-radius: 2px; }
        
        /* Canvas 牌的容器 */
        .tile-canvas {
            width: 36px; height: 50px; flex-shrink: 0; cursor: pointer;
            transition: transform 0.1s;
        }
        .tile-canvas:hover { transform: translateY(-4px); }
        .tile-canvas.selected { transform: translateY(-8px); }
        
        /* 按鈕 */
        .action-row {
            display: flex; gap: 8px; justify-content: center; margin-top: 8px; flex-wrap: wrap;
        }
        .btn {
            padding: 8px 14px; border: none; border-radius: 18px; cursor: pointer; font-size: 0.85rem;
            font-weight: bold; transition: all 0.2s;
        }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-success { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
        .btn-warning { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        /* 訊息 */
        .message {
            text-align: center; padding: 6px; background: rgba(255,255,255,0.05); 
            border-radius: 10px; margin: 8px 0; font-size: 0.8rem;
        }
        .toast {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: white; padding: 8px 16px; border-radius: 20px;
            z-index: 1000; font-size: 0.85rem;
        }
        
        /* 登入 */
        .auth-section { text-align: center; padding: 40px 20px; }
        .auth-section input { 
            padding: 12px; border: 2px solid #667eea; border-radius: 10px; 
            width: 180px; font-size: 1rem; margin: 5px;
        }
        
        /* 金幣不足 */
        .buy-coins {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        .buy-coins h2 { color: #ffd700; margin-bottom: 15px; }
        .buy-coins p { color: #aaa; margin-bottom: 20px; padding: 0 20px; }
        
        .turn-info { color: #ffd700; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🀄 T-LO 麻將</h1>
        
        <div id="authSection" class="auth-section">
            <input type="text" id="usernameInput" placeholder="輸入帳號">
            <br>
            <button class="btn btn-primary" onclick="doLogin()">進入遊戲</button>
        </div>
        
        <div id="gameSection" style="display:none;">
            <div class="top-bar">
                <span id="playerName">玩家</span>
                <span class="coin">🪙 <span id="coinDisplay">1000</span></span>
            </div>
            
            <div class="opponents-row">
                <div class="opponent">
                    <div class="opponent-name">電腦1</div>
                    <div class="opponent-tiles" id="opp1"></div>
                </div>
                <div class="opponent">
                    <div class="opponent-name">電腦2</div>
                    <div class="opponent-tiles" id="opp2"></div>
                </div>
                <div class="opponent">
                    <div class="opponent-name">電腦3</div>
                    <div class="opponent-tiles" id="opp3"></div>
                </div>
            </div>
            
            <div class="table-area">
                <div class="turn-info" id="turnInfo">🎴 等待開始</div>
            </div>
            
            <div class="player-area">
                <div class="player-label">你的手牌（點擊出牌）</div>
                <div class="player-hand" id="playerHand"></div>
            </div>
            
            <div class="action-row" id="actionPanel" style="display:none;">
                <button class="btn btn-success" onclick="doChi()">吃</button>
                <button class="btn btn-success" onclick="doPeng()">碰</button>
                <button class="btn btn-warning" onclick="doGang()">槓</button>
                <button class="btn btn-primary" onclick="doHu()">胡</button>
            </div>
            
            <div class="action-row">
                <button class="btn btn-primary" id="startBtn" onclick="startGame()">🎮 開始遊戲</button>
            </div>
            
            <div class="message" id="message">16張麻將 · 贏取金幣</div>
        </div>
    </div>
    
    <div id="buyCoinsModal" class="buy-coins" style="display:none;">
        <h2>🪙 金幣不足</h2>
        <p>您的金幣已用完，請聯繫客服購買金幣</p>
        <button class="btn btn-primary" onclick="contactLine()">📱 LINE 聯繫儲值</button>
    </div>

    <script>
        // ========== 麻將繪製系統 ==========
        const TILE_W = 36;
        const TILE_H = 50;
        
        // 牌面顏色
        const COLORS = {
            wan: '#c41e3a',    // 紅色
            tong: '#1e3a8a',    // 藍色
            tiao: '#065f46',    // 綠色
            zi: '#333',         // 深灰
            flower: '#059669'   // 綠色
        };
        
        function drawTileCanvas(type, value, selected = false) {
            const canvas = document.createElement('canvas');
            canvas.width = TILE_W;
            canvas.height = TILE_H;
            canvas.className = 'tile-canvas' + (selected ? ' selected' : '');
            
            const ctx = canvas.getContext('2d');
            
            // 牌身背景 - 漸層白色
            const gradient = ctx.createLinearGradient(0, 0, TILE_W, TILE_H);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.5, '#f5f5f5');
            gradient.addColorStop(1, '#e8e8e8');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(1, 1, TILE_W - 2, TILE_H - 2, 4);
            ctx.fill();
            
            // 陰影
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 3;
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 2;
            
            // 邊框
            ctx.strokeStyle = selected ? '#ffd700' : '#cccccc';
            ctx.lineWidth = selected ? 2 : 1;
            ctx.beginPath();
            ctx.roundRect(1, 1, TILE_W - 2, TILE_H - 2, 4);
            ctx.stroke();
            
            ctx.shadowColor = 'transparent';
            
            // 繪製牌面花色
            ctx.fillStyle = COLORS[type] || '#333';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            let text = '';
            if (type === 'wan') text = value + '萬';
            else if (type === 'tong') text = value + '筒';
            else if (type === 'tiao') text = value + '條';
            else if (type === 'zi') {
                const zis = ['東','南','西','北','中','發','白'];
                text = zis[value] || '?';
            }
            else if (type === 'flower') {
                const flowers = ['梅','蘭','菊','竹'];
                text = flowers[value] || '?';
            }
            
            // 主要數字/文字
            ctx.fillText(text.substring(0,1), TILE_W/2, TILE_H/2 - 4);
            
            // 小單位文字
            if (type !== 'zi' && type !== 'flower') {
                ctx.font = '8px Arial';
                ctx.fillText(text.substring(1), TILE_W/2, TILE_H - 8);
            }
            
            return canvas;
        }
        
        // ========== 遊戲系統 ==========
        let playerHand = [];
        let opponentHands = [[], [], []];
        let wall = [];
        let gameStarted = false;
        let coins = 1000;
        let username = '';
        
        function initTiles() {
            let tiles = [];
            for (let i = 1; i <= 9; i++) for (let j = 0; j < 4; j++) tiles.push({type:'wan',value:i});
            for (let i = 1; i <= 9; i++) for (let j = 0; j < 4; j++) tiles.push({type:'tong',value:i});
            for (let i = 1; i <= 9; i++) for (let j = 0; j < 4; j++) tiles.push({type:'tiao',value:i});
            for (let i = 0; i < 7; i++) for (let j = 0; j < 4; j++) tiles.push({type:'zi',value:i});
            return tiles;
        }
        
        function shuffle(tiles) {
            for (let i = tiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
            }
            return tiles;
        }
        
        function sortHand(hand) {
            const order = {wan:0, tong:1, tiao:2, zi:3, flower:4};
            return hand.sort((a, b) => {
                if (order[a.type] !== order[b.type]) return order[a.type] - order[b.type];
                return a.value - b.value;
            });
        }
        
        function deal() {
            playerHand = [];
            opponentHands = [[], [], []];
            let all = shuffle(initTiles());
            for (let i = 0; i < 16; i++) {
                playerHand.push(all.pop());
                for (let p = 0; p < 3; p++) opponentHands[p].push(all.pop());
            }
            wall = all;
            renderAll();
        }
        
        function renderAll() {
            // 玩家手牌
            const playerDiv = document.getElementById('playerHand');
            playerDiv.innerHTML = '';
            playerHand.forEach((t, i) => {
                const canvas = drawTileCanvas(t.type, t.value);
                canvas.onclick = () => selectTile(i);
                playerDiv.appendChild(canvas);
            });
            
            // 對手手牌（背面）
            ['opp1','opp2','opp3'].forEach((id, idx) => {
                document.getElementById(id).innerHTML = opponentHands[idx].map(() =>
                    `<div class="opp-tile">?</div>`
                ).join('');
            });
        }
        
        function selectTile(index) {
            if (!gameStarted) return;
            const tile = playerHand.splice(index, 1)[0];
            showToast(`打出：${tile.type}${tile.value}`);
            renderAll();
            
            document.getElementById('turnInfo').textContent = '電腦回合...';
            setTimeout(computerTurn, 1000);
        }
        
        function computerTurn() {
            if (opponentHands[0].length > 0) {
                const idx = Math.floor(Math.random() * opponentHands[0].length);
                opponentHands[0].splice(idx, 1);
            }
            if (wall.length > 0) {
                const t = wall.pop();
                playerHand.push(t);
                playerHand = sortHand(playerHand);
                showToast(`摸到：${t.type}${t.value}`);
            }
            renderAll();
            document.getElementById('turnInfo').textContent = '你的回合';
        }
        
        function showToast(msg) {
            document.querySelectorAll('.toast').forEach(t => t.remove());
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2000);
        }
        
        function startGame() {
            if (coins < 100) {
                document.getElementById('buyCoinsModal').style.display = 'flex';
                return;
            }
            deal();
            gameStarted = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('turnInfo').textContent = '你的回合';
            document.getElementById('message').textContent = '🎮 遊戲開始！';
        }
        
        function doChi() { showToast('吃'); }
        function doPeng() { showToast('碰'); }
        function doGang() { showToast('槓'); }
        function doHu() {
            showToast('🎉 胡了！ +100金幣');
            coins += 100;
            document.getElementById('coinDisplay').textContent = coins;
            if (username) localStorage.setItem('mahjong_coins_' + username, coins);
        }
        
        function contactLine() {
            window.open('https://line.me/ti/p/@HAPPYNEWYA', '_blank');
        }
        
        function doLogin() {
            const name = document.getElementById('usernameInput').value.trim();
            if (!name) { alert('請輸入帳號'); return; }
            username = name;
            coins = parseInt(localStorage.getItem('mahjong_coins_' + username)) || 1000;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('gameSection').style.display = 'block';
            document.getElementById('playerName').textContent = username;
            document.getElementById('coinDisplay').textContent = coins;
        }
    </script>
</body>
</html>
