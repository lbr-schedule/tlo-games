<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 T-LO 俄羅斯輪盤</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: white; }
        .container { max-width: 420px; margin: 0 auto; padding: 10px; }
        
        h1 { text-align: center; padding: 10px; color: #ffd700; font-size: 1.5rem; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: rgba(255,215,0,0.15); border-radius: 10px; margin-bottom: 10px; }
        .balance { font-size: 1.3rem; }
        .balance span { color: #ffd700; font-weight: bold; }
        .result-badge { padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 1rem; min-width: 80px; text-align: center; }
        .result-badge.win { background: rgba(0,200,100,0.4); color: #00ff00; }
        .result-badge.lose { background: rgba(255,100,100,0.4); color: #ff6666; }
        .result-badge.neutral { background: rgba(255,255,255,0.1); color: #aaa; }
        
        .timer-box { text-align: center; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 10px; }
        .timer-box .phase { font-size: 1rem; margin-bottom: 5px; }
        .timer-box .countdown { font-size: 2.5rem; font-weight: bold; color: #ffd700; }
        .timer-box.betting { border: 3px solid #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .timer-box.spinning { border: 3px solid #ff6600; animation: glow 0.5s infinite; }
        .timer-box.result { border: 3px solid #00aa00; }
        .timer-box.waiting { border: 3px solid #666; }
        @keyframes glow { 0%,100% { box-shadow: 0 0 10px #ff6600; } 50% { box-shadow: 0 0 25px #ff6600; } }
        
        .wheel-container { text-align: center; margin: 10px 0; position: relative; }
        .wheel { width: 320px; height: 320px; border-radius: 50%; margin: 0 auto; border: 8px solid #ffd700; background: conic-gradient(
            #009900 0deg 9.7deg,  /* 0 綠 */
            #cc0000 9.7deg 19.4deg,  /* 32 紅 */
            #1a1a1a 19.4deg 29.1deg, /* 15 黑 */
            #cc0000 29.1deg 38.8deg,  /* 19 紅 */
            #1a1a1a 38.8deg 48.5deg, /* 4 黑 */
            #cc0000 48.5deg 58.2deg,  /* 21 紅 */
            #1a1a1a 58.2deg 67.9deg,  /* 2 黑 */
            #cc0000 67.9deg 77.6deg,  /* 25 紅 */
            #1a1a1a 77.6deg 87.3deg,  /* 17 黑 */
            #cc0000 87.3deg 97deg,     /* 34 紅 */
            #1a1a1a 97deg 106.7deg,   /* 6 黑 */
            #cc0000 106.7deg 116.4deg,/* 27 紅 */
            #1a1a1a 116.4deg 126.1deg,/* 13 黑 */
            #cc0000 126.1deg 135.8deg,/* 36 紅 */
            #1a1a1a 135.8deg 145.5deg,/* 11 黑 */
            #cc0000 145.5deg 155.2deg,/* 30 紅 */
            #1a1a1a 155.2deg 164.9deg,/* 8 黑 */
            #cc0000 164.9deg 174.6deg,/* 23 紅 */
            #1a1a1a 174.6deg 184.3deg,/* 10 黑 */
            #cc0000 184.3deg 194deg,  /* 5 紅 */
            #1a1a1a 194deg 203.7deg,  /* 24 黑 */
            #cc0000 203.7deg 213.4deg,/* 16 紅 */
            #1a1a1a 213.4deg 223.1deg,/* 33 黑 */
            #cc0000 223.1deg 232.8deg,/* 1 紅 */
            #1a1a1a 232.8deg 242.5deg,/* 20 黑 */
            #cc0000 242.5deg 252.2deg,/* 14 紅 */
            #1a1a1a 252.2deg 261.9deg,/* 31 黑 */
            #cc0000 261.9deg 271.6deg,/* 9 紅 */
            #1a1a1a 271.6deg 281.3deg,/* 22 黑 */
            #cc0000 281.3deg 291deg,  /* 18 紅 */
            #1a1a1a 291deg 300.7deg,  /* 29 黑 */
            #cc0000 300.7deg 310.4deg,/* 7 紅 */
            #1a1a1a 310.4deg 320.1deg, /* 28 黑 */
            #cc0000 320.1deg 329.8deg,/* 12 紅 */
            #1a1a1a 329.8deg 339.5deg,/* 35 黑 */
            #cc0000 339.5deg 349.2deg,/* 3 紅 */
            #1a1a1a 349.2deg 360deg   /* 26 黑 */
        ); position: relative; overflow: hidden; transition: transform 0.5s ease-out; }
        .wheel.spinning { animation: spin 0.5s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .wheel-number { position: absolute; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; font-family: Arial, sans-serif; transform: translate(-50%, -50%); }
        .wheel-number.red { background: transparent; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .wheel-number.black { background: transparent; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .wheel-number.green { background: transparent; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
        .wheel-pointer { font-size: 2.5rem; position: absolute; top: -35px; left: 50%; transform: translateX(-50%); z-index: 10; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .result-display { text-align: center; font-size: 1.5rem; padding: 12px; border-radius: 12px; margin: 10px 0; font-weight: bold; }
        .result-display.red { background: rgba(204,0,0,0.5); }
        .result-display.black { background: rgba(50,50,50,0.5); }
        .result-display.green { background: rgba(0,170,0,0.5); }
        .result-display.waiting { background: rgba(255,255,255,0.1); }
        
        .help-box { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 0.8rem; color: #aaa; }
        .help-box h4 { color: #ffd700; margin-bottom: 5px; font-size: 0.9rem; }
        .help-box p { margin: 3px 0; }
        
        .bet-section { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .bet-section h3 { color: #ffd700; margin-bottom: 10px; font-size: 1rem; display: flex; align-items: center; gap: 5px; }
        
        .bet-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .bet-btn { padding: 12px 5px; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; }
        .bet-btn:hover:not(.disabled) { transform: scale(1.05); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .bet-btn:active:not(.disabled) { transform: scale(0.95); }
        .bet-btn.red { background: linear-gradient(135deg, #cc0000, #ff4444); color: white; }
        .bet-btn.black { background: linear-gradient(135deg, #333, #666); color: white; }
        .bet-btn.odd { background: linear-gradient(135deg, #0066cc, #00aaff); color: white; }
        .bet-btn.even { background: linear-gradient(135deg, #660066, #aa00aa); color: white; }
        .bet-btn.disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
        .bet-btn .multi { display: block; font-size: 0.7rem; opacity: 0.8; }
        
        .quick-bet { display: flex; gap: 6px; margin-bottom: 10px; justify-content: center; }
        .quick-bet button { padding: 10px 15px; background: #333; border: 2px solid #555; border-radius: 8px; color: white; cursor: pointer; font-size: 0.9rem; font-weight: bold; }
        .quick-bet button:hover { background: #444; border-color: #666; }
        .quick-bet button.active { background: #ffd700; color: #1a1a2e; border-color: #ffd700; }
        
        .number-bet { display: flex; gap: 8px; }
        .number-bet input { padding: 10px; border: 2px solid #555; border-radius: 8px; background: #2a2a4a; color: white; font-size: 0.95rem; }
        .number-bet input:focus { border-color: #ffd700; outline: none; }
        .number-bet button { padding: 10px 15px; background: #ffd700; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9rem; color: #1a1a2e; }
        .number-bet button.disabled { opacity: 0.4; cursor: not-allowed; }
        .number-bet button:hover:not(.disabled) { background: #ffdd44; }
        
        .bets-display { margin-top: 10px; }
        .current-bets-box { background: rgba(0,200,100,0.1); border: 2px solid rgba(0,200,100,0.3); padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .current-bets-box h4 { color: #00c864; margin-bottom: 8px; font-size: 0.95rem; }
        .history-bets-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; max-height: 150px; overflow-y: auto; }
        .history-bets-box h4 { color: #888; margin-bottom: 8px; font-size: 0.9rem; }
        
        .bet-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 0.9rem; }
        .bet-row.total { border-top: 1px dashed #444; margin-top: 5px; padding-top: 8px; font-weight: bold; }
        
        .history-row { padding: 5px 0; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .history-row:last-child { border-bottom: none; }
        .history-row .result-num { font-weight: bold; margin-right: 5px; }
        .history-row.win { color: #00ff00; }
        .history-row.lose { color: #ff6666; }
        
        .auth-section { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; text-align: center; }
        .auth-section h2 { color: #ffd700; margin-bottom: 15px; font-size: 1.2rem; }
        .auth-section p { color: #aaa; margin-bottom: 15px; font-size: 0.9rem; }
        .auth-section input { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #555; border-radius: 10px; background: #2a2a4a; color: white; font-size: 1rem; text-align: center; }
        .auth-section button { width: 100%; padding: 14px; background: linear-gradient(135deg, #ffd700, #ff8c00); border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: #1a1a2e; }
        .auth-section button:hover { background: linear-gradient(135deg, #ffdd44, #ffa020); }
        
        .no-bets { color: #666; font-style: italic; font-size: 0.85rem; text-align: center; padding: 10px; }
    </style>
</head>
<body>
    <h1>🎰 T-LO 俄羅斯輪盤</h1>
    
    <div class="container">
        <div class="top-bar">
            <div class="balance">💰 餘額: <span id="balance">1000</span></div>
            <div class="result-badge neutral" id="resultBadge">-</div>
        </div>
        
        <div class="timer-box waiting" id="timerBox">
            <div class="phase" id="phaseText">載入中...</div>
            <div class="countdown" id="countdown">-</div>
        </div>
        
        <div class="result-display waiting" id="resultDisplay">等待開始...</div>
        
        <div class="auth-section" id="authSection">
            <h2>🎰 歡迎來到俄羅斯輪盤</h2>
            <p>選擇幸運的颜色或數字，等待轉盤停止！</p>
            <input type="text" id="username" placeholder="輸入你的名字" value="Player1">
            <button onclick="startGame()">開始遊戲 🎮</button>
        </div>
        
        <div class="game-section" id="gameSection" style="display:none;">
            <div class="wheel-container">
                <div class="wheel-pointer">▼</div>
                <div class="wheel" id="wheel">
                    <div class="wheel-inner" id="wheelInner"></div>
                </div>
            </div>
            
            <div style="text-align:center;margin-top:5px;">
                <span class="result-display" id="resultDisplay" style="display:inline-block;padding:8px 20px;font-size:1rem;">等待開始...</span>
            </div>
            
            <div class="help-box">
                <h4>🎯 玩法說明</h4>
                <p>🔴 紅色 / ⚫ 黑色 - 2倍獎金</p>
                <p>單 / 雙 - 2倍獎金 | 數字 - 10倍獎金</p>
            </div>
            
            <div class="bet-section">
                <h3>💰 選擇下注</h3>
                
                <div class="quick-bet">
                    <button onclick="setQuickAmount(10)">10</button>
                    <button onclick="setQuickAmount(50)">50</button>
                    <button onclick="setQuickAmount(100)" class="active">100</button>
                    <button onclick="setQuickAmount(500)">500</button>
                </div>
                
                <div class="bet-buttons" id="betButtons">
                    <button class="bet-btn red disabled" onclick="placeBet('color', quickAmount, 'red')">🔴 紅<span class="multi">2x</span></button>
                    <button class="bet-btn black disabled" onclick="placeBet('color', quickAmount, 'black')">⚫ 黑<span class="multi">2x</span></button>
                    <button class="bet-btn odd disabled" onclick="placeBet('odd_even', quickAmount, 'odd')">單數<span class="multi">2x</span></button>
                    <button class="bet-btn even disabled" onclick="placeBet('odd_even', quickAmount, 'even')">雙數<span class="multi">2x</span></button>
                </div>
                
                <div class="number-bet">
                    <input type="number" id="betNum" placeholder="0-36" min="0" max="36" style="width:70px">
                    <input type="number" id="betAmt" placeholder="金額" min="10" value="100" style="flex:1">
                    <button id="numberBetBtn" class="disabled" onclick="placeNumberBet()">數字 10x</button>
                </div>
            </div>
            
            <div class="bets-display">
                <div class="current-bets-box">
                    <h4>🎯 本局下注 <span id="betTotal">0</span></h4>
                    <div id="currentBetsList"><span class="no-bets">點擊上方按鈕下注</span></div>
                </div>
                
                <div class="history-bets-box">
                    <h4>📜 歷史記錄</h4>
                    <div id="historyBetsList"><span class="no-bets">尚無記錄</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myName = '', myBalance = 1000, gamePhase = 'waiting', lastResult = null;
        let currentBets = [];
        let historyBets = [];
        let quickAmount = 100;
        let pollInterval;
        let lastProcessedSpinId = 0;
        let currentRotation = 0;
        
        // 輪盤數字位置 (真實輪盤排列)
        const wheelNumbers = [
            { num: 0, color: 'green' },
            { num: 32, color: 'red' }, { num: 15, color: 'black' }, { num: 19, color: 'red' }, { num: 4, color: 'black' },
            { num: 21, color: 'red' }, { num: 2, color: 'black' }, { num: 25, color: 'red' }, { num: 17, color: 'black' },
            { num: 34, color: 'red' }, { num: 6, color: 'black' }, { num: 27, color: 'red' }, { num: 13, color: 'black' },
            { num: 36, color: 'red' }, { num: 11, color: 'black' }, { num: 30, color: 'red' }, { num: 8, color: 'black' },
            { num: 23, color: 'red' }, { num: 10, color: 'black' }, { num: 5, color: 'red' }, { num: 24, color: 'black' },
            { num: 16, color: 'red' }, { num: 33, color: 'black' }, { num: 1, color: 'red' }, { num: 20, color: 'black' },
            { num: 14, color: 'red' }, { num: 31, color: 'black' }, { num: 9, color: 'red' }, { num: 22, color: 'black' },
            { num: 18, color: 'red' }, { num: 29, color: 'black' }, { num: 7, color: 'red' }, { num: 28, color: 'black' },
            { num: 12, color: 'red' }, { num: 35, color: 'black' }, { num: 3, color: 'red' }, { num: 26, color: 'black' }
        ];
        
        function initWheel() {
            const inner = document.getElementById('wheelInner');
            inner.innerHTML = '';
            // 數字在半徑125的位置，中心是160
            const radius = 125;
            const centerX = 160;
            const centerY = 160;
            
            wheelNumbers.forEach((item, i) => {
                // 每個數字佔 360/37 = 9.73度
                const angle = i * (360 / wheelNumbers.length);
                const rad = (angle - 90) * Math.PI / 180;
                const x = Math.cos(rad) * radius + centerX;
                const y = Math.sin(rad) * radius + centerY;
                
                const div = document.createElement('div');
                div.className = 'wheel-number ' + item.color;
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                div.textContent = item.num;
                inner.appendChild(div);
            });
        }
        
        function rotateToResult(result) {
            const index = wheelNumbers.findIndex(n => n.num === result);
            // 每個數字的角度
            const anglePerNumber = 360 / wheelNumbers.length;
            // 指針在頂部(0度位置)，所以數字要對準頂部
            // 由於數字是從頂部(-90度)開始排列，這裡要計算目標角度
            const targetAngle = index * anglePerNumber;
            // 隨機轉 5-8 圈，最後停在目標數字
            const spins = 5 + Math.floor(Math.random() * 4);
            // 總旋轉角度 = 總圈數 + 目標角度
            const totalRotation = spins * 360 + (360 - targetAngle);
            
            const wheel = document.getElementById('wheel');
            wheel.style.transform = 'rotate(' + totalRotation + 'deg)';
        }
        
        function setQuickAmount(amt) {
            quickAmount = amt;
            document.getElementById('betAmt').value = amt;
            document.querySelectorAll('.quick-bet button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function startGame() {
            myName = document.getElementById('username').value || 'Player' + Math.floor(Math.random() * 1000);
            myBalance = 1000;
            document.getElementById('balance').textContent = myBalance;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('gameSection').style.display = 'block';
            initWheel(); // 初始化轉盤
            currentBets = [];
            historyBets = [];
            lastProcessedSpinId = 0;
            updateCurrentBetsUI();
            updateHistoryUI();
            pollStatus();
            pollInterval = setInterval(pollStatus, 1000);
        }
        
        async function pollStatus() {
            try {
                const res = await fetch('/api/roulette/status');
                const data = await res.json();
                updateUI(data);
            } catch(e) {
                console.log('Poll error:', e);
            }
        }
        
        function updateUI(data) {
            const colors = { red: '🔴 紅', black: '⚫ 黑', green: '🟢 綠' };
            const timerBox = document.getElementById('timerBox');
            const phaseText = document.getElementById('phaseText');
            const countdown = document.getElementById('countdown');
            const btns = document.querySelectorAll('.bet-btn');
            const numberBtn = document.getElementById('numberBetBtn');
            const badge = document.getElementById('resultBadge');
            const wheel = document.getElementById('wheel');
            
            timerBox.className = 'timer-box';
            wheel.className = 'wheel';
            document.getElementById('resultDisplay').className = 'result-display';
            
            switch(data.phase) {
                case 'waiting':
                    phaseText.textContent = '⏳ 等待開始';
                    countdown.textContent = '-';
                    timerBox.classList.add('waiting');
                    badge.className = 'result-badge neutral';
                    badge.textContent = '-';
                    disableBtns();
                    break;
                    
                case 'betting':
                    phaseText.textContent = '⏰ 下注時間！';
                    countdown.textContent = (data.remaining || 0) + 's';
                    timerBox.classList.add('betting');
                    enableBtns();
                    
                    if (gamePhase !== 'betting') {
                        currentBets = [];
                        updateCurrentBetsUI();
                        badge.className = 'result-badge neutral';
                        badge.textContent = '-';
                    }
                    break;
                    
                case 'spinning':
                    phaseText.textContent = '🎰 轉動中...';
                    countdown.textContent = '❓';
                    timerBox.classList.add('spinning');
                    wheel.classList.add('spinning');
                    wheel.classList.remove('result-red', 'result-black', 'result-green');
                    disableBtns();
                    document.getElementById('resultDisplay').textContent = '🎰 轉動中...';
                    document.getElementById('resultDisplay').className = 'result-display waiting';
                    // 重置轉盤角度
                    document.getElementById('wheelInner').style.transform = 'rotate(0deg)';
                    break;
                    
                case 'result':
                    phaseText.textContent = '📌 結果出爐';
                    countdown.textContent = (data.remaining || 0) + 's';
                    timerBox.classList.add('result');
                    disableBtns();
                    
                    if (data.lastSpin) {
                        const colorName = colors[data.lastSpin.color];
                        const display = document.getElementById('resultDisplay');
                        display.textContent = '🎯 結果: ' + data.lastSpin.result + ' ' + colorName;
                        display.className = 'result-display ' + data.lastSpin.color;
                        
                        // 轉盤轉到結果
                        rotateToResult(data.lastSpin.result);
                        
                        const spinId = data.lastSpin.result + '-' + (data.lastSpin.time || 0);
                        if (spinId !== lastProcessedSpinId) {
                            lastProcessedSpinId = spinId;
                            processResult(data.lastSpin);
                        }
                    }
                    break;
            }
            
            gamePhase = data.phase;
        }
        
        function processResult(lastSpin) {
            let roundWin = 0;
            let roundBet = 0;
            
            for (const bet of currentBets) {
                roundBet += bet.amount;
                let win = false;
                
                if (bet.type === 'color' && bet.color === lastSpin.color) win = true;
                if (bet.type === 'odd_even') {
                    if (bet.choice === 'odd' && lastSpin.result % 2 === 1 && lastSpin.result !== 0) win = true;
                    if (bet.choice === 'even' && lastSpin.result % 2 === 0 && lastSpin.result !== 0) win = true;
                }
                if (bet.type === 'number' && bet.number === lastSpin.result) win = true;
                
                if (win) {
                    const prize = bet.type === 'number' ? bet.amount * 10 : bet.amount * 2;
                    roundWin += prize;
                }
            }
            
            myBalance = myBalance - roundBet + roundWin;
            document.getElementById('balance').textContent = myBalance;
            
            const badge = document.getElementById('resultBadge');
            if (roundWin > 0) {
                badge.textContent = '+' + roundWin;
                badge.className = 'result-badge win';
            } else if (roundBet > 0) {
                badge.textContent = '-' + roundBet;
                badge.className = 'result-badge lose';
            }
            
            if (roundBet > 0) {
                historyBets.unshift({
                    result: lastSpin.result,
                    color: lastSpin.color,
                    win: roundWin > 0,
                    amount: roundWin > 0 ? roundWin : -roundBet
                });
                
                if (historyBets.length > 10) historyBets.pop();
                updateHistoryUI();
            }
        }
        
        function updateCurrentBetsUI() {
            const list = document.getElementById('currentBetsList');
            const totalEl = document.getElementById('betTotal');
            let total = currentBets.reduce((sum, b) => sum + b.amount, 0);
            totalEl.textContent = total;
            
            if (currentBets.length === 0) {
                list.innerHTML = '<span class="no-bets">點擊上方按鈕下注</span>';
                return;
            }
            
            let html = '';
            for (const bet of currentBets) {
                html += `<div class="bet-row"><span>${bet.info}</span><span>${bet.amount}</span></div>`;
            }
            html += `<div class="bet-row total"><span>總計</span><span style="color:#ffd700">${total}</span></div>`;
            list.innerHTML = html;
        }
        
        function updateHistoryUI() {
            const list = document.getElementById('historyBetsList');
            if (historyBets.length === 0) {
                list.innerHTML = '<span class="no-bets">尚無記錄</span>';
                return;
            }
            
            let html = '';
            const colors = { red: '🔴', black: '⚫', green: '🟢' };
            
            for (const record of historyBets) {
                const colorEmoji = colors[record.color] || '⚪';
                const amountText = record.amount > 0 ? '+' + record.amount : record.amount;
                const rowClass = record.amount > 0 ? 'win' : 'lose';
                
                html += `<div class="history-row ${rowClass}">
                    <span class="result-num">${record.result} ${colorEmoji}</span>
                    <span>${amountText}</span>
                </div>`;
            }
            list.innerHTML = html;
        }
        
        function disableBtns() {
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.add('disabled'));
            document.getElementById('numberBetBtn').classList.add('disabled');
        }
        
        function enableBtns() {
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('disabled'));
            document.getElementById('numberBetBtn').classList.remove('disabled');
        }
        
        async function placeBet(type, amount, choice) {
            if (gamePhase !== 'betting') return;
            
            currentBets.push({ type, amount, info: choice });
            updateCurrentBetsUI();
            
            try {
                await fetch('/api/roulette/bet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: myName, betType: type, amount, color: choice, choice })
                });
            } catch(e) {}
        }
        
        async function placeNumberBet() {
            const num = parseInt(document.getElementById('betNum').value);
            const amt = parseInt(document.getElementById('betAmt').value);
            if (isNaN(num) || num < 0 || num > 36) { alert('請選0-36'); return; }
            if (isNaN(amt) || amt < 10) { alert('金額至少10'); return; }
            if (gamePhase !== 'betting') return;
            
            currentBets.push({ type: 'number', amount: amt, info: '#' + num });
            updateCurrentBetsUI();
            
            try {
                await fetch('/api/roulette/bet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: myName, betType: 'number', amount: amt, number: num })
                });
            } catch(e) {}
        }
    </script>
</body>
</html>
