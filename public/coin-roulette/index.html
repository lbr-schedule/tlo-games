<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪙 T-LO轉轉金幣</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); min-height: 100vh; color: white; }

        /* ====== 橫幅跑馬燈 ====== */
        .winner-marquee { display: none; background: linear-gradient(90deg, #ff6b00, #ffd700, #ff6b00); color: #1a1a2e; padding: 8px 0; font-weight: bold; text-align: center; overflow: hidden; white-space: nowrap; }
        .winner-marquee.show { display: block; }
        .winner-marquee span { display: inline-block; animation: marquee 15s linear infinite; }

        /* ====== 標題列 ====== */
        .header { display: flex; align-items: center; justify-content: center; padding: 12px 16px; background: rgba(0,0,0,0.3); gap: 10px; }
        .header-left { display: flex; gap: 8px; align-items: center; }
        .header-center { font-size: 1.3rem; font-weight: bold; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .header-right { display: flex; gap: 8px; align-items: center; }
        .icon-btn { background: rgba(255,255,255,0.1); border: 1px solid #555; border-radius: 8px; width: 38px; height: 38px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .icon-btn:hover { background: rgba(255,255,255,0.25); }
        .user-badge { background: rgba(255,215,0,0.15); border: 1px solid #ffd700; border-radius: 8px; padding: 6px 12px; font-size: 0.85rem; color: #ffd700; }

        /* ====== 遊戲統計列 ====== */
        .stats-bar { display: flex; justify-content: center; gap: 30px; padding: 10px 16px; background: rgba(0,0,0,0.2); font-size: 0.9rem; }
        .stats-bar .stat { display: flex; gap: 6px; align-items: center; color: #aaa; }
        .stats-bar .stat span { color: #ffd700; font-weight: bold; }

        /* ====== 主體 ====== */
        .container { display: flex; flex-direction: column; align-items: center; padding: 10px 16px 40px; }

        /* ====== 餘額 ====== */
        .balance-box { background: rgba(255,215,0,0.12); border: 2px solid #ffd700; border-radius: 12px; padding: 10px 28px; font-size: 1.3rem; margin: 10px 0; }
        .balance-box span { color: #ffd700; font-weight: bold; }

        /* ====== 轉盤 ====== */
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 10px 0; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 35px rgba(255,215,0,0.4); }
        .wheel-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85px; height: 85px; background: linear-gradient(145deg, #1a1a2e, #0f3460); border: 4px solid #ffd700; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; box-shadow: 0 0 15px rgba(255,215,0,0.5); transition: transform 0.2s; }
        .wheel-center:hover { transform: translate(-50%, -50%) scale(1.06); }
        .wheel-center.disabled { opacity: 0.5; pointer-events: none; }
        .wheel-center span { font-size: 1.05rem; font-weight: bold; color: #ffd700; }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 11px solid transparent; border-right: 11px solid transparent; border-top: 22px solid #ffd700; z-index: 5; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5)); }

        /* ====== 遊戲按鈕列 ====== */
        .game-tabs { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .tab-btn { padding: 10px 18px; background: rgba(255,255,255,0.05); border: 1px solid #555; border-radius: 10px; color: #aaa; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .tab-btn:hover, .tab-btn.active { background: rgba(255,215,0,0.2); border-color: #ffd700; color: #ffd700; }

        /* ====== 彈窗 ====== */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
        .modal.show { display: flex; }
        .modal-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid #ffd700; border-radius: 20px; padding: 28px; max-width: 370px; width: 90%; max-height: 85vh; overflow-y: auto; text-align: center; position: relative; }
        .modal-card h2 { color: #ffd700; margin-bottom: 12px; font-size: 1.25rem; }
        .modal-close { margin-top: 18px; padding: 10px 28px; background: rgba(255,255,255,0.1); border: 1px solid #555; border-radius: 10px; color: #aaa; cursor: pointer; font-size: 0.95rem; }
        .modal-close:hover { background: rgba(255,255,255,0.2); }

        /* ====== 說明（多頁） ====== */
        .help-page { display: none; text-align: left; font-size: 0.88rem; line-height: 1.7; }
        .help-page.active { display: block; }
        .help-page h3 { color: #ffd700; margin: 12px 0 6px; font-size: 1rem; }
        .help-page p { color: #ccc; margin: 4px 0; }
        .help-nav { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .help-nav button { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 0.9rem; cursor: pointer; font-weight: bold; }
        .help-nav .prev-btn { background: #444; color: white; }
        .help-nav .next-btn { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a2e; }

        /* ====== 排行榜 ====== */
        .leaderboard-list { text-align: left; max-height: 320px; overflow-y: auto; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 10px 6px; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 0.9rem; }
        .leaderboard-item:nth-child(1) .rank { color: #ffd700; font-weight: bold; }
        .leaderboard-item:nth-child(2) .rank { color: #c0c0c0; font-weight: bold; }
        .leaderboard-item:nth-child(3) .rank { color: #cd7f32; font-weight: bold; }
        .leaderboard-item .rank { width: 28px; }
        .leaderboard-item .name { flex: 1; color: #ddd; margin-left: 8px; }
        .leaderboard-item .bal { color: #ffd700; font-weight: bold; }

        /* ====== 歷史 ====== */
        .history-list { text-align: left; max-height: 320px; overflow-y: auto; font-size: 0.82rem; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .history-item .time { color: #888; width: 90px; }
        .history-item .mult { font-weight: bold; width: 50px; text-align: center; }
        .history-item .net { font-weight: bold; width: 70px; text-align: right; }
        .history-item.win .net { color: #4ade80; }
        .history-item.lose .net { color: #f87171; }

        /* ====== 反饋 ====== */
        .feedback-input { width: 100%; padding: 12px; border: 2px solid #555; border-radius: 10px; background: rgba(255,255,255,0.1); color: white; font-size: 0.92rem; resize: none; height: 90px; }
        .feedback-input:focus { border-color: #ffd700; outline: none; }
        .feedback-btn { width: 100%; padding: 12px; margin-top: 10px; background: linear-gradient(135deg, #ffd700, #ff8c00); border: none; border-radius: 10px; font-weight: bold; color: #1a1a2e; cursor: pointer; font-size: 1rem; }
        .feedback-msg { margin-top: 8px; font-size: 0.88rem; min-height: 18px; }
        .feedback-msg.ok { color: #4ade80; }
        .feedback-msg.err { color: #f87171; }

        /* ====== 邀請 ====== */
        .invite-box { background: rgba(255,215,0,0.1); border: 2px dashed #ffd700; border-radius: 12px; padding: 18px; margin: 12px 0; }
        .invite-desc { font-size: 0.85rem; color: #aaa; margin-bottom: 10px; }
        .invite-code { font-size: 1.7rem; font-weight: bold; color: #ffd700; letter-spacing: 5px; }

        /* ====== 結果彈窗 ====== */
        .result-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 200; backdrop-filter: blur(5px); }
        .result-popup.show { display: flex; }
        .result-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 3px solid #ffd700; border-radius: 24px; padding: 32px; text-align: center; max-width: 300px; width: 88%; animation: popIn 0.3s ease; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .result-card h2 { font-size: 1.35rem; margin-bottom: 10px; }
        .result-multiplier { font-size: 3rem; font-weight: bold; color: #ffd700; margin: 8px 0; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .result-coins { font-size: 1.25rem; margin: 8px 0; }
        .result-coins span { font-weight: bold; }
        .result-message { color: #aaa; margin: 8px 0; font-size: 0.92rem; }
        .result-message.good { color: #4ade80; }
        .result-message.bad { color: #f87171; }
        .result-btn { padding: 12px 32px; background: linear-gradient(135deg, #ffd700, #ff8c00); border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; color: #1a1a2e; cursor: pointer; margin-top: 12px; }

        /* ====== 廣告彈窗 ====== */
        .ad-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 300; }
        .ad-popup.show { display: flex; }
        .ad-card { background: white; border-radius: 15px; padding: 18px; max-width: 290px; width: 88%; text-align: center; position: relative; }
        .ad-card img { width: 100%; border-radius: 10px; max-height: 280px; object-fit: cover; }
        .ad-close { position: absolute; top: -8px; right: -8px; background: #333; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 0.95rem; }
        .ad-text { color: #333; margin-top: 8px; font-size: 0.88rem; }
        .ad-line { color: #06c755; font-weight: bold; margin-top: 4px; }

        /* ====== 活動公告彈窗 ====== */
        .promotion-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 250; backdrop-filter: blur(5px); }
        .promotion-modal.show { display: flex; }
        .promotion-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 3px solid #ffd700; border-radius: 24px; padding: 32px; max-width: 340px; width: 90%; text-align: center; animation: popIn 0.35s ease; }
        .promotion-card h2 { color: #ffd700; font-size: 1.4rem; margin-bottom: 8px; }
        .promotion-card .sub { color: #ffd700; font-size: 1.1rem; font-weight: bold; margin-bottom: 18px; }
        .promo-item { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 12px; padding: 14px; margin: 8px 0; text-align: left; font-size: 0.9rem; }
        .promo-item .title { color: #ffd700; font-weight: bold; margin-bottom: 4px; }
        .promo-item .desc { color: #ccc; font-size: 0.85rem; }
        .promo-btn { width: 100%; padding: 14px; margin-top: 15px; background: linear-gradient(135deg, #ffd700, #ff8c00); border: none; border-radius: 12px; font-size: 1.05rem; font-weight: bold; color: #1a1a2e; cursor: pointer; }

        /* ====== 登入/註冊 ====== */
        .auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-box { background: rgba(255,255,255,0.05); border: 2px solid #ffd700; border-radius: 20px; padding: 36px; max-width: 350px; width: 92%; text-align: center; }
        .auth-box h1 { color: #ffd700; font-size: 1.7rem; margin-bottom: 22px; text-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .auth-tabs { display: flex; margin-bottom: 18px; gap: 10px; }
        .auth-tab { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid #555; border-radius: 10px; cursor: pointer; color: #888; font-size: 0.95rem; transition: all 0.2s; }
        .auth-tab.active { background: rgba(255,215,0,0.2); border-color: #ffd700; color: #ffd700; }
        .auth-input { width: 100%; padding: 13px; margin: 7px 0; border: 2px solid #555; border-radius: 10px; background: rgba(255,255,255,0.1); color: white; font-size: 0.95rem; }
        .auth-input:focus { border-color: #ffd700; outline: none; }
        .auth-btn { width: 100%; padding: 13px; margin-top: 14px; background: linear-gradient(135deg, #ffd700, #ff8c00); border: none; border-radius: 10px; font-size: 1.05rem; font-weight: bold; color: #1a1a2e; cursor: pointer; }
        .auth-btn:hover { transform: scale(1.02); }
        .auth-msg { margin-top: 10px; font-size: 0.88rem; min-height: 18px; }
        .auth-msg.error { color: #f87171; }
        .auth-msg.success { color: #4ade80; }
        .hidden { display: none !important; }

        @keyframes marquee { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <!-- 橫幅跑馬燈 -->
    <div class="winner-marquee" id="winnerMarquee"><span id="marqueeText">🎉 訊息載入中...</span></div>

    <!-- 標題列 -->
    <div class="header" id="gameHeader" style="display:none;">
        <div class="header-left">
            <span class="user-badge" id="headerUsername">---</span>
            <button class="icon-btn" onclick="logout()" title="登出">🚪</button>
        </div>
        <div class="header-center">🪙 T-LO轉轉金幣</div>
        <div class="header-right">
            <button class="icon-btn" onclick="toggleSound()" id="soundBtn" title="音效">🔊</button>
            <button class="icon-btn" onclick="showLeaderboard()" title="排行榜">🏆</button>
        </div>
    </div>

    <!-- 統計列 -->
    <div class="stats-bar" id="statsBar" style="display:none;">
        <div class="stat">抽數：<span id="spinCount">0</span></div>
        <div class="stat">｜</div>
        <div class="stat">今日淨贏：<span id="todayNet">0</span></div>
    </div>

    <!-- 登入/註冊畫面 -->
    <div class="auth-screen" id="authScreen">
        <div class="auth-box">
            <h1>🪙 T-LO轉轉金幣</h1>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">登入</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">註冊</button>
            </div>
            <div id="loginForm">
                <input class="auth-input" type="text" id="loginUsername" placeholder="帳號">
                <input class="auth-input" type="password" id="loginPassword" placeholder="密碼">
                <button class="auth-btn" onclick="doLogin()">登入</button>
            </div>
            <div id="registerForm" class="hidden">
                <input class="auth-input" type="text" id="regUsername" placeholder="帳號">
                <input class="auth-input" type="password" id="regPassword" placeholder="密碼">
                <input class="auth-input" type="text" id="regRealname" placeholder="姓名 *">
                <input class="auth-input" type="tel" id="regPhone" placeholder="電話 *">
                <input class="auth-input" type="email" id="regEmail" placeholder="信箱（選填）">
                <input class="auth-input" type="text" id="regInviteCode" placeholder="邀請碼（選填）">
                <button class="auth-btn" onclick="doRegister()">註冊</button>
            </div>
            <div class="auth-msg" id="authMsg"></div>
        </div>
    </div>

    <!-- 遊戲主體 -->
    <div class="container" id="gameContainer" style="display:none;">
        <div class="balance-box">💰 <span id="balanceDisplay">0</span> 金幣</div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
            <div class="wheel-center" id="spinBtn" onclick="spin()"><span>開始</span></div>
        </div>

        <div class="game-tabs">
            <button class="tab-btn" onclick="showHistory()">📜 歷史</button>
            <button class="tab-btn" onclick="showFeedback()">💬 反饋</button>
            <button class="tab-btn" onclick="showInvite()">📩 邀請</button>
        </div>
    </div>

    <!-- 結果彈窗 -->
    <div class="result-popup" id="resultPopup">
        <div class="result-card">
            <h2 id="resultTitle">🎰 結果</h2>
            <div class="result-multiplier" id="resultMultiplier">x1.5</div>
            <div class="result-coins">獲得 <span id="resultCoins">+150</span></div>
            <div class="result-message" id="resultMessage">還不錯！</div>
            <button class="result-btn" onclick="closeResult()">確定</button>
        </div>
    </div>

    <!-- 廣告彈窗 -->
    <div class="ad-popup" id="adPopup">
        <div class="ad-card">
            <button class="ad-close" onclick="closeAd()">✕</button>
            <img id="adImg" src="" alt="廣告">
            <div class="ad-text">加入LINE好友了解更多</div>
            <div class="ad-line" id="adLine">LINE：@778ryayw</div>
        </div>
    </div>

    <!-- 活動公告彈窗 -->
    <div class="promotion-modal" id="promotionModal">
        <div class="promotion-card">
            <h2>🪙 T-LO轉轉金幣 活動公告</h2>
            <div class="sub">新手上線・豐富獎勵</div>
            <div class="promo-item">
                <div class="title">🎁 註冊就送</div>
                <div class="desc">新會員註冊即獲得 1,000 金幣免費試玩</div>
            </div>
            <div class="promo-item">
                <div class="title">📩 邀請優惠</div>
                <div class="desc">邀請朋友註冊，雙方都獲得 +200 金幣</div>
            </div>

            <button class="promo-btn" onclick="closePromotion()">我知道了</button>
        </div>
    </div>

    <!-- 排行榜彈窗 -->
    <div class="modal" id="leaderboardModal">
        <div class="modal-card">
            <h2>🏆 排行榜 TOP 15</h2>
            <div class="leaderboard-list" id="leaderboardList"></div>
            <button class="modal-close" onclick="closeModal('leaderboardModal')">關閉</button>
        </div>
    </div>

    <!-- 歷史彈窗 -->
    <div class="modal" id="historyModal">
        <div class="modal-card">
            <h2>📜 下注歷史</h2>
            <div class="history-list" id="historyList"></div>
            <button class="modal-close" onclick="closeModal('historyModal')">關閉</button>
        </div>
    </div>

    <!-- 反饋彈窗 -->
    <div class="modal" id="feedbackModal">
        <div class="modal-card">
            <h2>💬 意見反饋</h2>
            <p style="color:#aaa;font-size:0.88rem;margin-bottom:12px;">遇到問題或有建議？告訴我們！</p>
            <textarea class="feedback-input" id="feedbackText" placeholder="請輸入您的意見..."></textarea>
            <button class="feedback-btn" onclick="submitFeedback()">送出反饋</button>
            <div class="feedback-msg" id="feedbackMsg"></div>
            <button class="modal-close" onclick="closeModal('feedbackModal')">關閉</button>
        </div>
    </div>

    <!-- 邀請彈窗 -->
    <div class="modal" id="inviteModal">
        <div class="modal-card">
            <h2>📩 邀請活動</h2>
            <p style="color:#aaa;font-size:0.88rem;">邀請朋友註冊，雙方都獲得 <span style="color:#ffd700;font-weight:bold;">200 金幣</span>！</p>
            <div class="invite-box">
                <div class="invite-desc">您的邀請碼</div>
                <div class="invite-code" id="myInviteCode">---</div>

    <!-- 登出確認彈窗 -->
    <div class="modal" id="logoutModal" style="z-index:500;">
        <div class="modal-card" style="max-width:300px;">
            <h2 style="color:#ffd700;font-size:1.2rem;margin-bottom:15px;">🚪 確定要登出？</h2>
            <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;">
                <button onclick="document.getElementById('logoutModal').classList.remove('show')" style="padding:10px 24px;background:#444;border:none;border-radius:10px;color:white;cursor:pointer;">取消</button>
                <button onclick="confirmLogout();" id="logoutConfirmBtn" style="padding:10px 24px;background:linear-gradient(135deg,#ffd700,#ff8c00);border:none;border-radius:10px;color:#1a1a2e;font-weight:bold;cursor:pointer;">確定</button>
            </div>
        </div>
    </div>

    <script>
        // ====== 設定 ======
        const SEGMENTS = [
            { index: 0, label: '8X', color: '#dc2626' },
            { index: 1, label: '3X', color: '#ea580c' },
            { index: 2, label: '1.5X', color: '#ca8a04' },
            { index: 3, label: '1X', color: '#16a34a' },
            { index: 4, label: '0.5X', color: '#2563eb' },
            { index: 5, label: '0X', color: '#4b5563' }
        ];
        const BET = 100;
        const API_BASE = '';
        let currentUser = null;
        let isSpinning = false;
        let currentRotationDeg = 0;
        let soundEnabled = true;
        let bgm = null;

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const CX = 300, CY = 300, R = 280;
        const SECTOR_DEG = 60;

        // ====== 音效（Web Audio API）======
        let audioCtx = null;
        let masterGain = null;
        let bgmGain = null;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 1;
            masterGain.connect(audioCtx.destination);
            bgmGain = audioCtx.createGain();
            bgmGain.gain.value = 0.2;
            bgmGain.connect(masterGain);
        }

        function playSound(type) {
            if (!soundEnabled) return;
            if (!audioCtx) initAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            if (type === 'spin') {
                // 平穩上升滑音
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.7);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.setValueAtTime(0.2, now + 0.5);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(now);
                osc.stop(now + 0.8);
            } else if (type === 'win') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                [523,659,784,1047].forEach((f,i) => osc.frequency.setValueAtTime(f, now + i * 0.12));
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'lose') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(350, now);
                osc.frequency.exponentialRampToValueAtTime(180, now + 0.3);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'click') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1200, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.connect(gain);
                gain.connect(masterGain);
                osc.start(now);
                osc.stop(now + 0.05);
            }
        }

        let bgMusicPlaying = false;
        let bgMusicTimer = null;
        let bgmOsc = null;
        let bgmGainNode = null;

        function startBgMusic() {
            if (!soundEnabled || bgMusicPlaying) return;
            if (!audioCtx) initAudio();
            bgMusicPlaying = true;
            // 快速活潑的 casino BGM 旋律
            const melody = [523, 659, 784, 659, 784, 1047, 784, 523, 659, 523, 440, 523, 659, 784, 1047, 784];
            const bass = [131, 131, 165, 165, 196, 196, 131, 131];
            let step = 0;
            function playStep() {
                if (!bgMusicPlaying || !soundEnabled) { bgMusicPlaying = false; return; }
                const now = audioCtx.currentTime;
                // 主旋律
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'square';
                osc1.frequency.setValueAtTime(melody[step % melody.length], now);
                gain1.gain.setValueAtTime(0.06, now);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.18);
                osc1.connect(gain1);
                gain1.connect(bgmGain);
                osc1.start(now);
                osc1.stop(now + 0.18);
                // 低音
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'triangle';
                osc2.frequency.setValueAtTime(bass[step % bass.length], now);
                gain2.gain.setValueAtTime(0.05, now);
                gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
                osc2.connect(gain2);
                gain2.connect(bgmGain);
                osc2.start(now);
                osc2.stop(now + 0.22);
                step++;
                bgMusicTimer = setTimeout(playStep, 220);
            }
            playStep();
        }

        function initBgm() { initAudio(); startBgMusic(); }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').textContent = soundEnabled ? '🔊' : '🔇';
            if (masterGain) masterGain.gain.setValueAtTime(soundEnabled ? 1 : 0, audioCtx.currentTime);
            if (soundEnabled) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                if (!bgMusicPlaying) startBgMusic();
            } else {
                if (bgm) bgm.pause();
                bgMusicPlaying = false;
            }
        }

        // ====== 登入/註冊 ======
        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-tab').forEach(t => { if (t.textContent.includes(tab === 'login' ? '登入' : '註冊')) t.classList.add('active'); });
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
            document.getElementById('authMsg').textContent = '';
        }
        async function doLogin() {
            const u = document.getElementById('loginUsername').value.trim();
            const p = document.getElementById('loginPassword').value;
            if (!u || !p) { showAuthMsg('請填寫帳號和密碼', 'error'); return; }
            try {
                const res = await fetch(API_BASE + '/api/coin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
                const data = await res.json();
                if (data.success) { currentUser = data.player; showGame(); }
                else { showAuthMsg(data.message || '登入失敗', 'error'); }
            } catch(e) { showAuthMsg('網路錯誤', 'error'); console.error('Login error:', e); }
        }
        async function doRegister() {
            const u = document.getElementById('regUsername').value.trim();
            const p = document.getElementById('regPassword').value;
            const rn = document.getElementById('regRealname').value.trim();
            const ph = document.getElementById('regPhone').value.trim();
            const em = document.getElementById('regEmail').value.trim();
            const inv = document.getElementById('regInviteCode').value.trim();
            if (!u || !p) { showAuthMsg('請填寫帳號和密碼', 'error'); return; }
            if (!rn || !ph) { showAuthMsg('請填寫姓名和電話', 'error'); return; }
            try {
                const res = await fetch(API_BASE + '/api/coin/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p, realname: rn, phone: ph, email: em, inviteCode: inv }) });
                if (!res.ok) { showAuthMsg('伺服器錯誤:' + res.status, 'error'); return; }
                const data = await res.json();
                if (data.success) { showAuthMsg('註冊成功！請登入', 'success'); switchAuthTab('login'); }
                else { showAuthMsg(data.message || '註冊失敗', 'error'); }
            } catch(e) { console.error('Register error:', e); showAuthMsg('網路錯誤(' + e.message + ')', 'error'); }
        }
        function showAuthMsg(msg, type) { const el = document.getElementById('authMsg'); el.textContent = msg; el.className = 'auth-msg ' + type; }
        function logout() {
            document.getElementById('logoutModal').classList.add('show');
        }
        function confirmLogout() {
            currentUser = null;
            localStorage.removeItem('coinUser');
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('gameHeader').style.display = 'none';
            document.getElementById('statsBar').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'none';
            if (bgm) bgm.pause();
            document.getElementById('logoutModal').classList.remove('show');
        }

        function showGame() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('gameHeader').style.display = 'flex';
            document.getElementById('statsBar').style.display = 'flex';
            document.getElementById('gameContainer').style.display = 'flex';
            document.getElementById('headerUsername').textContent = currentUser.username;
            document.getElementById('balanceDisplay').textContent = currentUser.balance;
            document.getElementById('myInviteCode').textContent = currentUser.username;

            document.getElementById('todayNet').textContent = '0';

        function closePromotion() { document.getElementById('promotionModal').classList.remove('show'); }

        // ====== 轉盤繪製 ======
        function drawWheel(rotationDeg) {
            ctx.clearRect(0, 0, 600, 600);
            ctx.save();
            ctx.translate(CX, CY);
            ctx.rotate(rotationDeg * Math.PI / 180);
            for (let i = 0; i < SEGMENTS.length; i++) {
                const startRad = (i * SECTOR_DEG - 90) * Math.PI / 180;
                const endRad = ((i + 1) * SECTOR_DEG - 90) * Math.PI / 180;
                const midRad = ((i + 0.5) * SECTOR_DEG - 90) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, R, startRad, endRad);
                ctx.closePath();
                ctx.fillStyle = SEGMENTS[i].color;
                ctx.fill();
                ctx.strokeStyle = '#1a1a2e';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.save();
                ctx.rotate(midRad);
                ctx.textAlign = 'right';
                ctx.fillStyle = 'white';
                ctx.font = 'bold 26px Segoe UI';
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 4;
                ctx.fillText(SEGMENTS[i].label, R - 28, 6);
                ctx.restore();
            }
            ctx.restore();
            ctx.beginPath();
            ctx.arc(CX, CY, 28, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a2e';
            ctx.fill();
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 4;
            ctx.stroke();
        }
        drawWheel(0);

        function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

        function animateSpin(targetDeg) {
            const startDeg = currentRotationDeg;
            const totalDelta = targetDeg - startDeg;
            const duration = 4000;
            const startTime = Date.now();
            function step() {
                const t = Math.min((Date.now() - startTime) / duration, 1);
                drawWheel(startDeg + totalDelta * easeOut(t));
                if (t < 1) requestAnimationFrame(step);
                else currentRotationDeg = targetDeg;
            }
            requestAnimationFrame(step);
        }

        // ====== 旋轉 ======
        async function spin() {
            if (isSpinning) return;
            playSound('click');
            if (currentUser.balance < BET) { alert('金幣不足！'); return; }
            isSpinning = true;
            const btn = document.getElementById('spinBtn');
            btn.classList.add('disabled');
            btn.querySelector('span').textContent = '旋轉中...';
            try {
                const res = await fetch(API_BASE + '/api/coin/spin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: currentUser.username }) });
                const data = await res.json();
                const serverIndex = [8,3,1.5,1,0.5,0].indexOf(data.reward_multiplier);
                const midDeg = -90 + (serverIndex + 0.5) * SECTOR_DEG;
                let targetDeg = 270 - midDeg;
                if (targetDeg < 0) targetDeg += 360;
                const currentPos = ((currentRotationDeg % 360) + 360) % 360;
                const delta = (targetDeg - currentPos + 360) % 360;
                const totalDeg = currentRotationDeg + delta + 5 * 360;
                playSound('spin');
                animateSpin(totalDeg);
                setTimeout(() => {
                    showResultByIndex(serverIndex, data.reward_coins);
                    currentUser.balance = data.updated_balance;
                    document.getElementById('balanceDisplay').textContent = data.updated_balance;
                    // 更新統計
                    const cnt = parseInt(document.getElementById('spinCount').textContent) + 1;
                    const net = data.reward_coins - BET;
                    const prevNet = parseInt(document.getElementById('todayNet').textContent);
                    document.getElementById('spinCount').textContent = cnt;
                    document.getElementById('todayNet').textContent = prevNet + net;
                    if (data.ad) showAd(data.ad);
                    isSpinning = false;
                    btn.classList.remove('disabled');
                    btn.querySelector('span').textContent = '開始';
                }, 4200);
            } catch(e) {
                console.error('失敗:', e);
                isSpinning = false;
                btn.classList.remove('disabled');
                btn.querySelector('span').textContent = '開始';
            }
        }

        function showResultByIndex(idx, rewardCoins) {
            const popup = document.getElementById('resultPopup');
            document.getElementById('resultMultiplier').textContent = 'x' + [8,3,1.5,1,0.5,0][idx];
            const net = rewardCoins - BET;
            const coins = document.getElementById('resultCoins');
            coins.textContent = (net >= 0 ? '+' : '') + net;
            coins.style.color = net >= 0 ? '#4ade80' : '#f87171';
            const msg = document.getElementById('resultMessage');
            const title = document.getElementById('resultTitle');
            title.textContent = '🎰 結果';
            msg.className = 'result-message';
            if (idx === 0) { title.textContent = '🎉 超級大獎！'; msg.textContent = '運氣爆棚！8倍金幣！'; msg.classList.add('good'); }
            else if (idx === 1) { title.textContent = '🎊 大獎！'; msg.textContent = '太棒了！3倍金幣！'; msg.classList.add('good'); }
            else if (idx === 2) { title.textContent = '👍 不錯！'; msg.textContent = '小贏一把！'; msg.classList.add('good'); }
            else if (idx === 3) { title.textContent = '😅 沒輸沒贏'; msg.textContent = '剛好回本！'; }
            else if (idx === 4) { title.textContent = '😢 可惜'; msg.textContent = '只拿回一半...'; msg.classList.add('bad'); }
            else { title.textContent = '💸 沒中'; msg.textContent = '差一點中大獎！'; msg.classList.add('bad'); }
            popup.classList.add('show');
            // 播放結果音效
            const isWin = idx <= 2;
            playSound(isWin ? 'win' : 'lose');
            // 大贏跑馬燈
            if (net >= 500) showWinnerMarquee(currentUser.username, net);
        }

        function showWinnerMarquee(name, net) {
            const el = document.getElementById('winnerMarquee');
            document.getElementById('marqueeText').textContent = `🎉 恭喜 ${name} 單次贏得 ${net} 金幣！`;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 15000);
        }

        function closeResult() { document.getElementById('resultPopup').classList.remove('show'); }

        // ====== 廣告 ======
        function showAd(ad) {
            if (!ad || !ad.url) return;
            const img = document.getElementById('adImg');
            img.onload = () => { document.getElementById('adPopup').classList.add('show'); };
            img.onerror = () => { document.getElementById('adPopup').classList.add('show'); };

            document.getElementById('adLine').textContent = 'LINE：' + (ad.lineId || '@778ryayw');

        // ====== 讀餘額 ======
        async function loadBalance() {
            if (!currentUser) return;
            try {
                const res = await fetch(API_BASE + '/api/coin/balance?user_id=' + currentUser.username);
                const data = await res.json();
                if (data.balance !== undefined) {
                    currentUser.balance = data.balance;
                    document.getElementById('balanceDisplay').textContent = data.balance;
                }
            } catch(e) {}
        }

        // ====== 排行榜 ======
        async function showLeaderboard() {
            try {
                const res = await fetch(API_BASE + '/api/coin/leaderboard');
                const data = await res.json();
                const list = document.getElementById('leaderboardList');
                if (data.leaderboard && data.leaderboard.length > 0) {
                    list.innerHTML = data.leaderboard.map((p, i) => `<div class="leaderboard-item"><span class="rank">#${i+1}</span><span class="name">${p.username}</span><span class="bal">${p.balance}</span></div>`).join('');
                } else { list.innerHTML = '<p style="color:#aaa;text-align:center;padding:20px;">暫無資料</p>'; }

            document.getElementById('leaderboardModal').classList.add('show');
        }

        // ====== 歷史 ======
        async function showHistory() {
            if (!currentUser) return;
            try {
                const res = await fetch(API_BASE + '/api/coin/history/' + currentUser.username);
                const data = await res.json();
                const list = document.getElementById('historyList');
                if (data.history && data.history.length > 0) {
                    list.innerHTML = data.history.map(h => {
                        const isWin = h.reward >= h.bet_amount;
                        const net = h.reward - h.bet_amount;
                        const time = new Date(h.timestamp).toLocaleString('zh-TW', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
                        return `<div class="history-item ${isWin ? 'win' : 'lose'}"><span class="time">${time}</span><span class="mult">x${h.multiplier}</span><span class="net">${isWin ? '+' : ''}${net}</span></div>`;
                    }).join('');
                } else { list.innerHTML = '<p style="color:#aaa;text-align:center;padding:20px;">暫無歷史</p>'; }
            } catch(e) {}
            document.getElementById('historyModal').classList.add('show');
        }

        // ====== 反饋 ======
        async function submitFeedback() {
            const text = document.getElementById('feedbackText').value.trim();
            if (!text) { document.getElementById('feedbackMsg').textContent = '請輸入內容'; document.getElementById('feedbackMsg').className = 'feedback-msg err'; return; }
            try {
                await fetch(API_BASE + '/api/coin/feedback', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: currentUser.username, feedback: text }) });
                document.getElementById('feedbackMsg').textContent = '感謝您的意見！';
                document.getElementById('feedbackMsg').className = 'feedback-msg ok';
                document.getElementById('feedbackText').value = '';
            } catch(e) { document.getElementById('feedbackMsg').textContent = '傳送失敗'; document.getElementById('feedbackMsg').className = 'feedback-msg err'; }
        }
        function showFeedback() { document.getElementById('feedbackModal').classList.add('show'); }
        function showHelp() { document.getElementById('helpModal').classList.add('show'); showHelpPage(1); }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }

        document.getElementById('resultPopup').addEventListener('click', e => { if (e.target.id === 'resultPopup') closeResult(); });

        // ====== 自動填入 ======
        const saved = localStorage.getItem('coinUser');
        if (saved) { try { const d = JSON.parse(saved); document.getElementById('loginUsername').value = d.username || ''; document.getElementById('loginPassword').value = d.password || ''; } catch(e) {} }
